name: Deploy Site

on:
  push:
    branches: [main]
    paths: [site/**, .github/workflows/deploy-site.yml]
  pull_request:
    paths: [site/**]
  workflow_dispatch:

concurrency:
  group: deploy-site-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        working-directory: site
        run: bun install --frozen-lockfile

      - name: Build
        working-directory: site
        run: bun run build

      - name: Build Pages Functions
        run: npx wrangler@4 pages functions build --outdir site/dist --outfile _worker.js --functions-dir site/functions

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: '4'
          command: pages deploy site/dist --project-name=bewitch --branch=${{ github.head_ref || github.ref_name }}
