name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Build artifacts
        run: docker build -f Dockerfile.build -o dist .

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.arch }}
          path: dist/

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: >-
          gh release create "${{ github.ref_name }}"
          dist/*.deb dist/*.tar.gz
          --title "${{ github.ref_name }}"
          --generate-notes

  apt-repo:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Upload artifacts to R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: scripts/upload-pool.sh dist/*.deb dist/*.tar.gz

      - name: Write GPG key to file
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: printenv GPG_PRIVATE_KEY > /tmp/signing.key

      - name: Build APT repo image
        run: docker build -f Dockerfile.repo -t bewitch-repo .

      - name: Generate signed APT repo metadata
        run: |
          docker run --rm \
            -e SITE_PUBLIC=/work/site/public \
            -e GPG_KEY_FILE=/work/signing.key \
            -v "${{ github.workspace }}/dist:/work/dist" \
            -v "${{ github.workspace }}/site/public:/work/site/public" \
            -v /tmp/signing.key:/work/signing.key:ro \
            bewitch-repo dist/*.deb

      - name: Clean up GPG key
        if: always()
        run: rm -f /tmp/signing.key

      - name: Upload APT metadata to R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: scripts/upload-dists.sh site/public

      - name: Purge APT metadata cache
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        run: |
          curl -sf -X POST \
            "https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{
              "files": [
                "https://bewitch.dev/apt/dists/stable/Release",
                "https://bewitch.dev/apt/dists/stable/Release.gpg",
                "https://bewitch.dev/apt/dists/stable/InRelease",
                "https://bewitch.dev/apt/dists/stable/main/binary-amd64/Packages",
                "https://bewitch.dev/apt/dists/stable/main/binary-amd64/Packages.gz",
                "https://bewitch.dev/apt/dists/stable/main/binary-arm64/Packages",
                "https://bewitch.dev/apt/dists/stable/main/binary-arm64/Packages.gz"
              ]
            }'

  versioned-docs:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Install site dependencies
        working-directory: site
        run: bun install --frozen-lockfile

      - name: Build versioned docs
        working-directory: site
        env:
          VITE_DOCS_BASE: /docs/v${{ steps.version.outputs.version }}
        run: bun run build

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Upload versioned docs to R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: scripts/upload-versioned-docs.sh site/dist ${{ steps.version.outputs.version }}
